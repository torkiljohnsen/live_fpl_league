name: Weekly Report & Narrative

on:
  schedule:
    - cron: "0 6 * * *"   # Runs at 06:00 UTC every day
  workflow_dispatch:       # Allow manual runs

permissions:
  contents: write   # Needed to push changes

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Detect latest finished gameweek
        id: detect
        run: |
          python - <<'PYEOF'
          import json
          import os
          from pathlib import Path

          import requests

          LEAGUE_ID = "1639886"

          # Fetch bootstrap-static to find latest finished GW and season
          resp = requests.get(
              "https://fantasy.premierleague.com/api/bootstrap-static/",
              timeout=30,
          )
          resp.raise_for_status()
          bootstrap = resp.json()
          events = bootstrap.get("events", [])

          # Find latest finished GW
          finished_gw = None
          for event in reversed(events):
              if event.get("finished", False):
                  finished_gw = event["id"]
                  break

          if finished_gw is None:
              print("No finished gameweek found.")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("skip=true\n")
              raise SystemExit(0)

          # Derive season string (e.g. '2025-26')
          first_deadline = events[0].get("deadline_time", "")
          year = int(first_deadline[:4])
          season = f"{year}-{str(year + 1)[-2:]}"

          # Check if report already exists
          report_path = Path(f"weekly_report/reports/{LEAGUE_ID}/{season}/gw{finished_gw}.json")
          if report_path.is_file():
              print(f"Report already exists: {report_path}")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("skip=true\n")
              raise SystemExit(0)

          print(f"New gameweek detected: GW{finished_gw} (season {season})")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"skip=false\n")
              f.write(f"gw={finished_gw}\n")
              f.write(f"season={season}\n")
          PYEOF

      - name: Generate weekly report and narrative
        if: steps.detect.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python generate_weekly_report.py -l 1639886 -e ${{ steps.detect.outputs.gw }} --narrative

      - name: Commit and push changes
        if: steps.detect.outputs.skip != 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add weekly_report/reports/ weekly_report/narratives/ weekly_report/reidar_memory/
          git commit -m "chore: generate weekly report for GW${{ steps.detect.outputs.gw }}"
          git push
