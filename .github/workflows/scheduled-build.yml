name: Nightly Dashboard & Weekly Report

on:
  schedule:
    - cron: "0 5 * * *"   # Runs at 05:00 UTC every day
  workflow_dispatch:       # Allow manual runs too

permissions:
  contents: write   # Needed to push changes

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0   # Needed so git can detect changes properly
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate standings and gw history for the Sinkaberg leagues
        run: python generate_html.py -l 1639886,1638989 --cache-dir .fpl_cache

      - name: Generate Index
        run: python generate_index.py

      - name: Generate weekly report and narrative
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          python generate_weekly_report.py -l 1638989 --narrative --notify-teams --skip-existing --cache-dir .fpl_cache

      - name: Copy hero images to docs/assets
        run: |
          mkdir -p docs/assets
          for img in weekly_report/reidars_rapport_*.png; do
            cp -n "$img" docs/assets/ 2>/dev/null || true
          done

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/
          for dir in weekly_report/reports weekly_report/reidar_memory; do
            [ -d "$dir" ] && git add "$dir"
          done
          git diff --cached --quiet || (
            git commit -m "chore: nightly dashboard and report update [skip ci]"
            git push
          )
