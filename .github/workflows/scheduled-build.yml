name: Nightly Dashboard Update

on:
  schedule:
    - cron: "0 5 * * *"   # Runs at 05:00 UTC every day
  workflow_dispatch:       # Allow manual runs too

permissions:
  contents: write   # Needed to push changes

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0   # Needed so git can detect changes properly
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate standings and gw history for the Sinkaberg leagues
        run: python generate_html.py -l 1639886,1638989

      - name: Generate Index
        run: python generate_index.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          if [[ `git status --porcelain docs/` ]]; then
            git add docs/
            git commit -m "Update docs [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi
