name: Nightly Dashboard Update

on:
  schedule:
    - cron: "0 2 * * *"   # Runs at 02:00 UTC every day
  workflow_dispatch:       # Allow manual runs too

permissions:
  contents: write   # Needed to push changes

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0   # Needed so git can detect changes properly
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        run: python generate_html.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          if [[ `git status --porcelain docs/index.html` ]]; then
            git add docs/index.html
            git commit -m "Nightly dashboard update"
            git push origin dev
          else
            echo "No changes to commit."
          fi
